<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat del Aula</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 70%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            word-wrap: break-word;
        }

        .message-meta {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .message-author {
            font-weight: 600;
            color: #667eea;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-area input:disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .logout-btn:disabled {
            display: none;
        }

        .timestamp {
            font-size: 11px;
            color: #bbb;
        }

        /* MODAL STYLES */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-modal-content {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-modal-content h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 700;
        }

        .login-modal-content p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            margin-top: 8px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: none;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            width: auto;
            margin-top: 12px;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .admin-panel {
            padding: 20px;
            background: #fff3cd;
            border-top: 2px solid #ffc107;
        }

        .admin-header {
            font-size: 14px;
            font-weight: 600;
            color: #856404;
            margin-bottom: 12px;
        }

        .admin-info {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .stat-box {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .stat-label {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .admin-password-input {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .admin-password-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .admin-password-input button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        @media (max-width: 600px) {
            .container {
                max-height: none;
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 90%;
            }

            .chat-header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .login-modal-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Chat principal -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="user-info">
                    <span>💬</span>
                    <div>
                        <div class="user-badge" id="userDisplay">Visitante anónimo</div>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn" onclick="handleLogout()" style="display: none;">Cerrar sesión</button>
            </div>

            <div class="messages-area" id="messagesContainer">
                <div class="empty-state">No hay mensajes aún. ¡Sé el primero en escribir!</div>
            </div>

            <div id="adminNotice" style="display: none;" class="admin-panel">
                <div class="admin-header">⚙️ Panel de Administrador</div>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-label">Mensajes totales</div>
                        <div class="stat-value" id="totalMessages">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Usuarios únicos</div>
                        <div class="stat-value" id="uniqueUsers">0</div>
                    </div>
                </div>
                <button class="btn btn-danger" onclick="clearChatHistory()">🗑️ Limpiar historial</button>
                <p class="admin-info">⚠️ Esta acción eliminará todos los mensajes y es irreversible.</p>
            </div>

            <div class="input-area">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Inicia sesión para escribir..."
                    onkeypress="handleKeyPress(event)"
                    disabled
                >
                <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>Enviar</button>
            </div>

            <!-- Modal de login -->
            <div id="loginModal" class="login-modal">
                <div class="login-modal-content">
                    <h2>📚 Chat del Aula</h2>
                    <p>Identifícate para chatear</p>
                    
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="studentName">Nombre completo</label>
                            <input type="text" id="studentName" placeholder="Tu nombre" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="paralelo">Paralelo</label>
                            <select id="paralelo" required>
                                <option value="">Selecciona tu paralelo</option>
                                <option value="A">Paralelo A</option>
                                <option value="B">Paralelo B</option>
                                <option value="C">Paralelo C</option>
                                <option value="D">Paralelo D</option>
                                <option value="E">Paralelo E</option>
                            </select>
                        </div>

                        <button type="submit" class="btn">Entrar</button>
                    </form>

                    <button class="btn btn-secondary" onclick="toggleAdminPanel()">Acceso Administrador</button>

                    <div id="adminLoginPanel" style="margin-top: 20px; display: none;">
                        <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">
                        <p style="font-size: 14px; color: #333; margin-bottom: 12px; font-weight: 600;">Panel Administrador</p>
                        <div class="admin-password-input">
                            <input type="password" id="adminPassword" placeholder="Contraseña">
                            <button type="button" onclick="handleAdminLogin()">Ingresar</button>
                        </div>
                        <p style="font-size: 12px; color: #999;">Contraseña: admin123</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'admin123';
        const STORAGE_KEY = 'classroom_chat_messages';
        const USERS_KEY = 'classroom_chat_users';
        
        let currentUser = null;
        let isAdmin = false;
        let messages = [];
        let users = {};

        // Inicializar
        function init() {
            loadData();
            renderMessages();
            enableMessageInput();
        }

        // Cargar datos
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    messages = JSON.parse(stored);
                } catch (e) {
                    messages = [];
                }
            }
            
            const storedUsers = localStorage.getItem(USERS_KEY);
            if (storedUsers) {
                try {
                    users = JSON.parse(storedUsers);
                } catch (e) {
                    users = {};
                }
            }
        }

        // Guardar datos
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        // Mostrar modal login
        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        // Cerrar modal login
        function hideLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('studentName').value = '';
            document.getElementById('paralelo').value = '';
            document.getElementById('adminLoginPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        // Toggle admin panel
        function toggleAdminPanel() {
            const panel = document.getElementById('adminLoginPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        // Actualizar display usuario
        function updateUserDisplay() {
            if (currentUser) {
                document.getElementById('userDisplay').textContent = `${currentUser.name} - Paralelo ${currentUser.paralelo}`;
                document.getElementById('logoutBtn').style.display = 'block';
            } else {
                document.getElementById('userDisplay').textContent = 'Visitante anónimo';
                document.getElementById('logoutBtn').style.display = 'none';
            }
        }

        // Habilitar/deshabilitar input
        function enableMessageInput() {
            const input = document.getElementById('messageInput');
            const btn = document.getElementById('sendBtn');
            
            if (currentUser) {
                input.disabled = false;
                btn.disabled = false;
                input.placeholder = 'Escribe tu mensaje...';
                input.style.opacity = '1';
                input.style.cursor = 'text';
            } else {
                input.disabled = true;
                btn.disabled = true;
                input.placeholder = 'Inicia sesión para escribir...';
                input.style.opacity = '0.6';
                input.style.cursor = 'not-allowed';
            }
        }

        // Login estudiante
        function handleLogin(event) {
            event.preventDefault();
            const name = document.getElementById('studentName').value.trim();
            const paralelo = document.getElementById('paralelo').value;
            
            if (!name || !paralelo) {
                alert('Por favor completa todos los campos');
                return;
            }
            
            currentUser = { name, paralelo };
            isAdmin = false;
            hideLoginModal();
            updateUserDisplay();
            enableMessageInput();
            document.getElementById('messageInput').focus();
        }

        // Login admin
        function handleAdminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                currentUser = { name: 'Administrador', paralelo: 'ADMIN' };
                hideLoginModal();
                updateUserDisplay();
                enableMessageInput();
                document.getElementById('adminNotice').style.display = 'block';
                updateAdminStats();
            } else {
                alert('Contraseña incorrecta');
                document.getElementById('adminPassword').value = '';
            }
        }

        // Logout
        function handleLogout() {
            currentUser = null;
            isAdmin = false;
            document.getElementById('adminNotice').style.display = 'none';
            updateUserDisplay();
            enableMessageInput();
            showLoginModal();
        }

        // Enviar mensaje
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser) return;
            
            const message = {
                id: Date.now(),
                author: currentUser.name,
                paralelo: currentUser.paralelo,
                text: text,
                timestamp: new Date().toLocaleString('es-ES')
            };
            
            messages.push(message);
            users[currentUser.name] = currentUser.paralelo;
            saveData();
            
            input.value = '';
            renderMessages();
            updateAdminStats();
            
            const container = document.getElementById('messagesContainer');
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }

        // Renderizar mensajes
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state">No hay mensajes aún. ¡Sé el primero en escribir!</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message">
                    <div class="message-author">
                        ${msg.paralelo === 'ADMIN' ? '👨‍💼' : '👤'} ${msg.author} - ${msg.paralelo}
                    </div>
                    <div class="message-content">
                        ${escapeHtml(msg.text)}
                    </div>
                    <div class="message-meta">
                        <span class="timestamp">${msg.timestamp}</span>
                    </div>
                </div>
            `).join('');
        }

        // Escapar HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Actualizar stats admin
        function updateAdminStats() {
            document.getElementById('totalMessages').textContent = messages.length;
            document.getElementById('uniqueUsers').textContent = Object.keys(users).length;
        }

        // Limpiar historial
        function clearChatHistory() {
            if (confirm('⚠️ ¿Estás seguro? Esta acción eliminará todos los mensajes.')) {
                if (confirm('✓ Confirma nuevamente que deseas borrar todo el historial')) {
                    messages = [];
                    users = {};
                    saveData();
                    renderMessages();
                    updateAdminStats();
                    alert('✓ Historial limpiado exitosamente');
                }
            }
        }

        // Tecla Enter para enviar
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Inicializar app
        init();
    </script>
</body>
</html>
